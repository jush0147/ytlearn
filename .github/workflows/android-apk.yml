name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate android project from Expo config
        run: CI=1 npx expo prebuild --platform android

      - name: Force release signing to debug keystore in CI
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('android/app/build.gradle')
          s = p.read_text()
          s2 = s.replace('signingConfig signingConfigs.release', 'signingConfig signingConfigs.debug')
          p.write_text(s2)
          print('Patched signingConfig to debug (if needed).')
          PY

      - name: Build release APK (bundled JS, no Metro required)
        working-directory: android
        run: ./gradlew :app:assembleRelease -x lint -x test --stacktrace

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ytlearn-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload unsigned release APK fallback
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ytlearn-release-apk-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: ignore
