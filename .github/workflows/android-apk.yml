name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Confirm Java version
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          which java
          java -version

      - name: Install dependencies
        run: npm ci

      - name: Generate android project from Expo config
        run: CI=1 npx expo prebuild --platform android

      - name: Force release signing to debug keystore in CI
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('android/app/build.gradle')
          s = p.read_text()
          s2 = s.replace('signingConfig signingConfigs.release', 'signingConfig signingConfigs.debug')
          p.write_text(s2)
          print('Patched signingConfig to debug (if needed).')
          PY

      - name: Pin Gradle runtime JDK to Java 17
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          tail -n 5 android/gradle.properties

      - name: Build release APK (bundled JS, no Metro required)
        id: build_release
        continue-on-error: true
        working-directory: android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew :app:assembleRelease -x lint -x test --stacktrace --console=plain 2>&1 | tee ../gradle-build.log

      - name: Upload Gradle build log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log

      - name: Upload release APK artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ytlearn-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: ignore

      - name: Upload unsigned release APK fallback
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ytlearn-release-apk-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: ignore

      - name: Fail workflow if Gradle build failed
        if: ${{ steps.build_release.outcome != 'success' }}
        run: |
          echo "Gradle build failed. Please download gradle-build-log artifact for exact stacktrace."
          exit 1
